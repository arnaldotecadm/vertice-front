<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vértice Sistemas is a Portugal-based software engineering consultancy building scalable web platforms, backend systems, cloud-native applications, and APIs for businesses undergoing digital transformation."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Vértice Sistemas | Custom Software Engineering</title>
    <script>
      // Applies the saved/preferred theme before first paint to avoid a
      // flash of the wrong theme. Kept in sync with src/theme/ThemeContext.
      (function () {
        try {
          var stored = localStorage.getItem("vertice-theme");
          var isDark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", isDark);
        } catch {
          // Ignore (e.g. localStorage disabled) and fall back to light mode.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
